        <link rel="icon" href="%sveltekit.assets%/favicon.png" />

            rel="apple-touch-icon"
            href="%sveltekit.assets%/icons/icon-192.png"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
