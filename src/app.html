<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link
            rel="icon"
            href="%sveltekit.assets%/icons/favicon.ico"
            sizes="any"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="%sveltekit.assets%/icons/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="%sveltekit.assets%/icons/favicon-16x16.png"
        />
        <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
        <link
            rel="preload"
            href="%sveltekit.assets%/assets/logo.png"
            as="image"
            fetchpriority="high"
        />
        <link
            rel="preload"
            href="%sveltekit.assets%/assets/bg.png"
            as="image"
            fetchpriority="high"
        />
        <link
            rel="preload"
            href="%sveltekit.assets%/assets/button.png"
            as="image"
            fetchpriority="high"
        />
        <link
            rel="preload"
            href="%sveltekit.assets%/assets/character.png"
            as="image"
            fetchpriority="high"
        />
        <link
            rel="preload"
            href="%sveltekit.assets%/assets/fonts/Mabinogi_Classic/Mabinogi_Classic.otf"
            as="font"
            type="font/otf"
            crossorigin
        />
        <link
            rel="apple-touch-icon"
            href="%sveltekit.assets%/icons/apple-touch-icon.png"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#100f0f" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="콩생역전" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
